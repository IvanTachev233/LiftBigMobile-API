# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - LiftBigMobile-API

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # - name: Run tests
      #   run: npm run test

      - name: Prepare deployment package
        run: |
          rm -rf node_modules
          npm ci --omit=dev
          zip -r deploy.zip dist node_modules package.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4DB6C56D279242B2BF8B2F34D9C5ED7C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9BBDADFD35D84E71937F294F0D19695C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_83782005AAA7408C8139CF4647A19573 }}

      - name: Deploy to Azure Web App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --settings \
              WEBSITE_RUN_FROM_PACKAGE=1 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false
            az webapp config set --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --startup-file "node dist/main.js"
            az webapp deploy --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --src-path deploy.zip \
              --type zip \
              --clean true
