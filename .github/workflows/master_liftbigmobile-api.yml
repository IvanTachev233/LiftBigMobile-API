# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - LiftBigMobile-API

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      # - name: Run tests
      #   run: npm run test

      - name: Install production deps only
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4DB6C56D279242B2BF8B2F34D9C5ED7C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9BBDADFD35D84E71937F294F0D19695C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_83782005AAA7408C8139CF4647A19573 }}

      - name: Configure app settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              NODE_ENV=production \
              WEBSITE_RUN_FROM_PACKAGE=0
            az webapp config set --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --startup-file "node dist/main.js"

      - name: Start app if stopped
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp start --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} || true
            sleep 10

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'LiftBigMobile-API'
          slot-name: 'Production'
          package: .

      - name: Restart app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

      - name: Check deployment logs
        if: always()
        uses: azure/cli@v2
        with:
          inlineScript: |
            sleep 30
            az webapp log tail --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --timeout 60 || true
