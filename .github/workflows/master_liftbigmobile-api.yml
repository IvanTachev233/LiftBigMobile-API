# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - LiftBigMobile-API

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      # - name: Run tests
      #   run: npm run test

      - name: Prepare deployment zip
        run: |
          rm -rf node_modules
          npm ci --omit=dev
          zip -r deploy.zip dist node_modules package.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4DB6C56D279242B2BF8B2F34D9C5ED7C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9BBDADFD35D84E71937F294F0D19695C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_83782005AAA7408C8139CF4647A19573 }}

      - name: Configure and deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Configure app settings (works even when app is stopped)
            az webapp config appsettings set --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              NODE_ENV=production \
              WEBSITE_RUN_FROM_PACKAGE=0

            az webapp config set --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --startup-file "node dist/main.js"

            # Start the app and wait for SCM site to be ready
            az webapp start --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} || true
            echo "Waiting for SCM site..."
            sleep 30

            # Deploy using Kudu zip API via az rest
            SUBSCRIPTION=$(az account show --query id -o tsv)
            RG=${{ secrets.AZURE_RESOURCE_GROUP }}
            az rest --method PUT \
              --url "https://management.azure.com/subscriptions/${SUBSCRIPTION}/resourceGroups/${RG}/providers/Microsoft.Web/sites/LiftBigMobile-API/extensions/zipdeploy?api-version=2024-04-01" \
              --headers "Content-Type=application/zip" \
              --body @deploy.zip

            # Restart to pick up new code
            az webapp restart --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

      - name: Check deployment logs
        if: always()
        uses: azure/cli@v2
        with:
          inlineScript: |
            sleep 30
            az webapp log tail --name LiftBigMobile-API \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --timeout 60 || true
