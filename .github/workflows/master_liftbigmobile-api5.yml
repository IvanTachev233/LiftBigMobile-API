# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - liftbigmobile-api5

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      # - name: Run tests
      #   run: npm run test

      - name: Install production dependencies
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Prepare deployment zip
        run: |
          zip -r deploy.zip dist node_modules package.json package-lock.json
          ls -lh deploy.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5D28D1FEE33849689BACE27808C0B904 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_89EA25DF4A964A8F8DF1A7F304D5BCD8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8842E784F1B0425AB2E85D983DBDC8C8 }}

      - name: Configure and deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Configure settings and startup command BEFORE deploy
            az webapp config appsettings set --name liftbigmobile-api5 \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              NODE_ENV=production

            az webapp config set --name liftbigmobile-api5 \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --startup-file "node dist/main.js"

            # Deploy
            az webapp deploy --name liftbigmobile-api5 \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --src-path deploy.zip \
              --type zip

            az webapp restart --name liftbigmobile-api5 \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
